name: HanStoryPlayer
options:
  bundleIdPrefix: com.saulcervantes
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: "1"
targets:
  HanStoryPlayer:
    type: application
    platform: iOS
    sources: [HanStoryPlayer]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saulcervantes.HanStoryPlayer
        INFOPLIST_FILE: HanStoryPlayer/Info.plist
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: HanStoryPlayer/HanStoryPlayer.entitlements
    scheme:
      testTargets: [HanStoryPlayerTests]
  HanStoryPlayerTests:
    type: bundle.unit-test
    platform: iOS
    sources: [HanStoryPlayerTests]
    dependencies:
      - target: HanStoryPlayer

