name: Deploy HanStory Player Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'HanStoryPlayerWeb/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: HanStoryPlayerWeb
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Validar módulos JavaScript
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Construir artefacto público
        run: python3 scripts/build_pages_artifact.py --output .pages-dist

      - name: Agregar configuración pública de Supabase
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          python3 -c "import json, os, pathlib; p=pathlib.Path('.pages-dist/src/config.local.js'); p.write_text('export const SUPABASE_URL='+json.dumps(os.environ.get('SUPABASE_URL',''))+';\nexport const SUPABASE_PUBLISHABLE_KEY='+json.dumps(os.environ.get('SUPABASE_PUBLISHABLE_KEY',''))+';\n', encoding='utf-8')"
          python3 scripts/build_pages_artifact.py --output .pages-dist --validate-only

      - name: Comprobar que solo contiene el Web Player
        run: |
          test -f .pages-dist/index.html
          test -f .pages-dist/service-worker.js
          test -f .pages-dist/library/library.json
          test ! -e .pages-dist/HanStoryPlayer
          test ! -e .pages-dist/src/ui
          ! find .pages-dist -type f \( -name '.env*' -o -name '*.pem' -o -name '*.key' -o -name '*.db' -o -name '*.zip' \) -print -quit | grep -q .

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: HanStoryPlayerWeb/.pages-dist

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
